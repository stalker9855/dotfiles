
[module/audio]
type = internal/pulseaudio


format-volume = <ramp-volume><label-volume>
format-volume-overline = ${colors.background}
format-volume-underline = ${colors.background}

; Available tags:
;   <label-muted> (default)
;   <ramp-volume>
;   <bar-volume>
format-muted = <label-muted>
format-muted-prefix = 
format-muted-prefix-background = ${colors.red}
format-muted-prefix-foreground = ${colors.mantle}
format-muted-prefix-padding = 1
format-muted-overline = ${colors.background}
format-muted-underline = ${colors.background}

; Available tokens:
;   %percentage% (default)
label-volume = %percentage%%
label-volume-background = ${colors.background-alt}
label-volume-padding = 1

; Available tokens:
;   %percentage% (default
label-muted = "Muted"
label-muted-foreground = ${colors.foreground}
label-muted-background = ${colors.background-alt}
label-muted-padding = 1

; Only applies if <ramp-volume> is used
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-background = ${colors.green}
ramp-volume-foreground = ${colors.mantle}
ramp-volume-padding = 1

; If defined, it will replace <ramp-volume> when
; headphones are plugged in to `headphone_control_numid`
; If undefined, <ramp-volume> will be used for both
; Only applies if <ramp-volume> is used
ramp-headphones-0 = 
ramp-headphones-background = ${colors.blue}
ramp-headphones-padding = 1


[module/menu]
type = custom/text
click-left = rofi -show

content = 
content-padding = 1
content-foreground = ${colors.mantle}
content-background = ${colors.teal}
content-underline = ${colors.background}
content-overline = ${colors.background}


[module/date]
type = internal/date
interval = 1

date = %I:%M %p
date-alt = %Y-%m-%d %H:%M:%S

format = <label>
format-prefix = 
format-prefix-padding = 1
format-prefix-background = ${colors.lavender}
format-prefix-foreground = ${colors.mantle}
format-prefix-underline = ${colors.background}
format-prefix-overline  = ${colors.background}
label = %date%
label-foreground = ${colors.foreground}
label-underline = ${colors.background}
label-overline = ${colors.background}
label-background = ${colors.background-alt}
label-padding = 1

[module/keyboard]
type = internal/xkeyboard
blacklist-0 = num lock

format = <label-layout>

format-prefix = 
format-prefix-padding = 1
format-prefix-background = ${colors.maroon}
format-prefix-foreground = ${colors.mantle}
format-prefix-underline = ${colors.background}
format-prefix-overline  = ${colors.background}


label-layout = %layout%
label-layout-foreground = ${colors.foreground}
label-layout-underline = ${colors.background}
label-layout-overline = ${colors.background}
label-layout-background = ${colors.background-alt}
label-layout-padding = 1


label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/separator]
type = custom/text
content = 
content-padding = 0
content-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
;

[module/powermenu]
type = custom/text
click-left = ~/.config/rofi/powermenu.sh

label = %{F#f38ba8}%{F-}
label-foreground = ${colors.primary}


[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-foreground = #fab387

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt
